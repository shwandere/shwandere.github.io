{% if site.navigation_footer %}
<nav class="nav  nav--footer">
  <ul class="list list--nav">
    {% for item in site.navigation_footer %}

      {% if item.url contains '://' %}
        {% assign url = item.url %}
      {% else %}
        {% assign url = item.url | relative_url %}
      {% endif %}

      <li class="item  item--nav{% if item.url == page.url %}  item--current{% endif %}">
        <a href="{{ url }}">{{ item.title }}</a>
      </li>
    {% endfor %}
  </ul>
</nav>
{% else %}
  {% include nav-default.html %}
{% endif %}


<!-- 1. Load the local unminified Fuse engine asset first -->
<script src="{{ '/assets/js/fuse.js' | relative_url }}"></script>

<!-- 2. Load your custom search script second, with a cache-buster timestamp -->
<script src="{{ '/assets/js/rk.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
